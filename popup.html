<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusLedger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="popup-body">
  <div class="popup-root">
    <header class="popup-header">
      <div class="popup-wordmark">
        <div class="popup-wordmark-icon">FL</div>
        FocusLedger
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusLabel">Idle</span>
      </div>
    </header>

    <div class="popup-hero">
      <div class="popup-hero-label">Today's active time</div>
      <div class="popup-hero-time" id="heroTime">—</div>
    </div>

    <div class="cat-bar">
      <div class="cat-bar-seg productive" id="barProductive" style="width:0%"></div>
      <div class="cat-bar-seg neutral" id="barNeutral" style="width:100%"></div>
      <div class="cat-bar-seg unproductive" id="barUnproductive" style="width:0%"></div>
    </div>
    <div class="cat-legend">
      <div class="cat-legend-item"><span class="cat-legend-dot productive"></span>Productive</div>
      <div class="cat-legend-item"><span class="cat-legend-dot neutral"></span>Neutral</div>
      <div class="cat-legend-item"><span class="cat-legend-dot unproductive"></span>Unproductive</div>
    </div>

    <div class="popup-sites">
      <div class="popup-sites-header">Top Sites</div>
      <div id="popupSitesList"><div class="popup-empty">No activity recorded today.</div></div>
    </div>

    <div class="popup-now" id="popupNow">
      <span class="popup-now-label">Now</span>
      <span class="popup-now-domain" id="nowDomain">—</span>
    </div>

    <hr class="popup-divider">

    <div class="popup-notify">
      <span class="popup-notify-label">Daily report at</span>
      <input type="time" id="reportTime" class="popup-time-input">
      <button id="saveBtn" class="icon-btn" title="Save notification time">✓</button>
    </div>
    <div class="popup-save-feedback" id="saveFeedback"></div>

    <div class="popup-actions">
      <button id="viewReportBtn" class="btn-primary">Open Dashboard</button>
      <button id="settingsBtn" class="btn-ghost">Settings</button>
    </div>
  </div>
  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
