<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body class="popup-body">
    <div class="card">
        <div class="header">
            <h2>Time Tracker</h2>
            <div class="status-dot"></div>
        </div>
        <div class="input-group">
            <label for="reportTime">Daily Notification Time</label>
            <input type="time" id="reportTime">
        </div>
        <button id="saveBtn" class="btn-primary">Save Time</button>
        <button id="viewReportBtn" class="btn-secondary">Open Dashboard</button>
        <div id="status"></div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
