<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Time Tracker — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="assets/chart.umd.js"></script>
</head>

<body class="report-body">
  <div class="report-root">

    <!-- ── Header ─────────────────────────────────────────────────────────────── -->
    <header class="report-header">

      <div class="report-logo">
        <div class="report-logo-icon">⏱</div>
        Pro Time Tracker
      </div>

      <div class="view-tabs">
        <button class="view-tab active" data-view="day">Day</button>
        <button class="view-tab" data-view="week">Week</button>
        <button class="view-tab" data-view="month">Month</button>
      </div>

      <div class="date-nav">
        <button class="icon-btn" id="prevBtn" title="Previous period">‹</button>
        <span class="date-display" id="dateDisplay">Today</span>
        <button class="icon-btn" id="nextBtn" title="Next period">›</button>
        <input type="date" id="datePickerHidden" class="date-picker-hidden">
        <button class="icon-btn" id="calBtn" title="Pick date">📅</button>
      </div>

      <div class="report-header-actions">
        <button class="btn-outline" id="exportBtn">Export CSV</button>
        <a href="settings.html" class="icon-btn" title="Settings">⚙</a>
      </div>

    </header>

    <!-- ── Main ───────────────────────────────────────────────────────────────── -->
    <main class="report-main">

      <!-- Stats row -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total Active Time</div>
          <div class="stat-card-value mono" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Top Domain</div>
          <div class="stat-card-value" id="statTop" style="font-size:15px">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Productive</div>
          <div class="stat-card-value green mono" id="statProductive">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Sites Visited</div>
          <div class="stat-card-value accent mono" id="statSites">—</div>
        </div>
      </div>

      <!-- Chart + legend -->
      <div class="chart-section">
        <div class="chart-card">
          <canvas id="mainChart"></canvas>
        </div>
        <div class="legend-panel">
          <div class="legend-panel-title">Breakdown</div>
          <div class="legend-items" id="legendItems">
            <div class="legend-empty">No data</div>
          </div>
        </div>
      </div>

      <!-- Domain table -->
      <div class="table-section">
        <div class="table-toolbar">
          <span class="table-toolbar-title">Usage Breakdown</span>
          <input type="search" id="searchInput" class="search-input" placeholder="Filter domains…">
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:auto">Domain</th>
                <th style="width:120px">Category</th>
                <th style="width:110px" class="right">Time</th>
                <th style="width:140px">Share</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="4" class="empty-state">No data recorded.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
  <script src="report.js"></script>
</body>

</html>
