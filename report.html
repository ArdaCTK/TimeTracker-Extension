<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pro Time Tracker - Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="assets/chart.umd.js"></script>
</head>

<body class="report-body">
    <div class="container">
        <div class="header-text">
            <h1>Analytics Dashboard</h1>
            <div class="header-right">
                <input type="date" id="dateSelector" class="date-picker">
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card stat-card">
                <h3>Total Active Time</h3>
                <div id="totalTime" class="total-time-value">0s</div>
                <div class="stat-desc">Total tracked hours today</div>
            </div>
            <div class="card chart-card">
                <canvas id="usageChart"></canvas>
            </div>
        </div>

        <div class="card table-card">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Domain / Sub-paths</th>
                        <th style="text-align: right; width: 120px;">Time Spent</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="2" class="empty-state">No data recorded for this date.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="report.js"></script>
</body>

</html>
